name: Deploy Stable

on:
  push:
    branches:
      - master

jobs:
  deploy_stable_version:
    name: Deploy stable version
    if: ${{ contains(github.event.head_commit.message, '[bump-version]') }}
    runs-on: ubuntu-22.04
    env:
      TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
      TRAKT_CLIENT_SECRET: ${{ secrets.TRAKT_CLIENT_SECRET }}
      ROLLBAR_TOKEN: ${{ secrets.ROLLBAR_TOKEN }}
      TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
      CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
      CHROME_EXTENSION_KEY: ${{ secrets.CHROME_EXTENSION_KEY }}
      CHROME_PUBLISHER_ID: ${{ secrets.CHROME_PUBLISHER_ID }}
      FIREFOX_EXTENSION_ID: ${{ secrets.FIREFOX_EXTENSION_ID }}
    steps:
      - uses: actions/checkout@v3
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Build
        run: pnpm run build
      - name: Deploy version
        uses: ./.github/actions/deploy-stable
        with:
          trakt-tools-bot-token: '${{ secrets.TRAKT_TOOLS_BOT_TOKEN }}'
      - name: Upload to Chrome store
        env:
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: node .github/scripts/upload-chrome-webstore.js ./dist/chrome.zip
      - name: Upload to Firefox store
        env:
          FIREFOX_CLIENT_ID: ${{ secrets.FIREFOX_CLIENT_ID }}
          FIREFOX_CLIENT_SECRET: ${{ secrets.FIREFOX_CLIENT_SECRET }}
        run: node .github/scripts/upload-firefox-addon.js ./dist/firefox.zip
